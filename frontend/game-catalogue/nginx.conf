server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend container (listens on 8080).
    # Use Docker's embedded DNS resolver + a variable so nginx resolves the
    # upstream lazily at request time (it won't crash if the API starts later).
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api_upstream api:8080;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        # Forward the full host incl. port so the API builds correct absolute
        # image URLs (e.g. http://localhost:4200/api/v1/games/images/{key}).
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
