name: gamecatalogue

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamecatalogue-api
    ports:
      # Host port is overridable to avoid conflicts (e.g. macOS AirPlay owns 5000):
      #   API_PORT=5080 docker-compose -f docker-compose.backend.yml up -d
      - "${API_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__WriteConnection: "Server=sqlserver;Database=GameCatalogue;User Id=sa;Password=GameCatalogue_2024!;TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__ReadConnection: "Server=sqlserver;Database=GameCatalogue;User Id=sa;Password=GameCatalogue_2024!;TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__Redis: "redis:6379"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "minioadmin"
      MinIO__SecretKey: "minioadmin"
      MinIO__BucketName: "game-covers"
      MinIO__UseSsl: "false"
    networks:
      - gamecatalogue

networks:
  gamecatalogue:
    name: gamecatalogue
